front:
  text: 觀無量壽佛經義疏序釋元照述堪忍濁土異趣群居安養淨邦上善俱會是知棘林胎獄宜奮志以長辭寶界金池可潛神而直往潮音偏讚遍見琅函海眾高棲備聞青史但以機宜殊等誘掖多門或恒課密言或專持嘉號或克期繫念或潔己修齋各赴時緣備存眾典唯茲正觀畢趣無生信是除疑捨障之神方長生不死之要術也歷觀前古受誦尤多逮至方今樂聞益眾忝從早歲專翫斯文翻嗟億劫之無歸深慶餘生之有賴然則諸師著撰各尚所宗後進披尋莫知攸往由是參詳名理酬挍古今摭取優長芟除繁瑣述而不作何敢侮於前修統之有宗庶可貽於來學文從簡易意在修治月藉指標見月而無勞執指岸因舟度到岸而自可忘舟曲被未來不負韋提之虔請仰承遺囑敢忘慶喜之重宣聊贊上來冀資西邁云耳
